<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ボスデータテーブル</title>
    <style>
        /* =========================================
           CSS変数（カラーパレット）
        ========================================= */
        :root {
            --bg-body: #121212;
            --bg-table: #1e1e1e;
            --bg-th: #333333;
            --bg-tr-even: #252525;
            --bg-tr-hover: #3a3a3a;
            --text-main: #e0e0e0;
            --text-muted: #aaaaaa;
            --border-color: #444444;
            --btn-bg: #4a90e2;
            --btn-hover: #357abd;
            --btn-active: #f39c12;
        }

        /* =========================================
           ベーススタイル
        ========================================= */
        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: sans-serif;
            padding: 20px;
            margin: 0;
        }

        h1 {
            margin-top: 0;
            text-align: center;
        }

        /* =========================================
           コントロールパネル
        ========================================= */
        .controls-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            margin-bottom: 20px;
            width: 95%;
            margin-left: auto;
            margin-right: auto;
        }

        .controls-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .section-title {
            font-weight: bold;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-items: center;
        }

        button {
            padding: 8px 10px;
            cursor: pointer;
            background-color: var(--btn-bg);
            border: none;
            color: white;
            border-radius: 4px;
            min-width: 144px;
            text-align: center;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--btn-hover);
        }

        button.active {
            background-color: var(--btn-active);
            font-weight: bold;
        }

        button.btn-success {
            background-color: #27ae60;
        }
        button.btn-success:hover {
            background-color: #219653;
        }

        /* =========================================
           入力フォーム
        ========================================= */
        input[type="text"], textarea.update-textarea {
            padding: 8px 12px;
            background-color: var(--bg-th);
            border: 1px solid #555;
            color: white;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .search-section {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 95%;
            margin-left: auto;
            margin-right: auto;
        }

        .search-section input[type="text"] {
            width: 100%;
            max-width: 600px;
            padding: 12px 16px;
            font-size: 16px;
        }

        textarea.update-textarea {
            resize: vertical;
            white-space: pre;
        }

        /* =========================================
           テーブル（表）スタイル
        ========================================= */
        table {
            border-collapse: collapse;
            width: 95%;
            margin: 0 auto;
            background-color: var(--bg-table);
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 10px;
            text-align: left;
            line-height: 2;
        }

        th {
            background-color: var(--bg-th);
            color: white;
            white-space: nowrap;
        }

        tr:nth-child(even) {
            background-color: var(--bg-tr-even);
        }

        tr:hover {
            background-color: var(--bg-tr-hover);
        }

        /* =========================================
           耐性アイコン専用スタイル
        ========================================= */
        .col-耐性アイコン {
            width: 216px;
            min-width: 216px;
            max-width: 216px;
            text-align: center;
            white-space: normal;
        }

        .icon-img, .icon-text {
            box-sizing: border-box;
            display: inline-block;
            width: 32px;
            height: 32px;
            margin: 2px;
            vertical-align: middle;
            border-radius: 6px;
        }

        .icon-img {
            background-color: #555555; 
            border: 1px solid #777;
            object-fit: contain;
        }

        .icon-text {
            line-height: 32px;
            text-align: center;
            color: #777777;
            font-weight: bold;
        }

        .resist-row-inline {
            display: inline-flex;
            justify-content: center;
            flex-wrap: nowrap;
            width: 100%;
        }

        .is-hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <h1>PoE2 ver0.5 マップボスリスト</h1>

    <div class="controls-wrapper">
        <div class="controls-section">
            <div class="section-title">初期化</div>
            <div class="button-group">
                <button onclick="resetView()">初期化</button>
            </div>
        </div>

        <div class="controls-section">
            <div class="section-title">並び変更</div>
            <div class="button-group">
                <button id="sort-kana" data-label="五十音" onclick="sortTable('読み仮名', 'sort-kana')">五十音：順</button>
                <button id="sort-eng" data-label="アルファベット" onclick="sortTable('マップ英語', 'sort-eng')">アルファベット：順</button>
            </div>
        </div>

        <div class="controls-section">
            <div class="section-title">表示切替</div>
            <div class="button-group">
                <button id="btn-kana" data-label="読み仮名" onclick="toggleColumns(['読み仮名'], 'btn-kana')">読み仮名：表示</button>
                <button id="btn-map" data-label="日本語名" onclick="toggleColumns(['マップ', 'ボス'], 'btn-map')">日本語名：表示</button>
                <button id="btn-eng" data-label="英語名" onclick="toggleColumns(['マップ英語', 'ボス英語'], 'btn-eng')">英語名：表示</button>
                <button id="btn-origin" data-label="元ボス情報" onclick="toggleColumns(['元ボスアクト', '元ボスエリア', '元ボス名', '元ボス特徴'], 'btn-origin')">元ボス情報：表示</button>
                <button id="btn-memo" data-label="メモ" class="active" onclick="toggleColumns(['メモ'], 'btn-memo')">メモ：非表示</button>
            </div>
        </div>
    </div>

    <div class="search-section">
        <div class="section-title">検索</div>
        <input type="text" id="searchInput" oninput="filterTable()" placeholder="キーワードを入力して検索...">
    </div>

    <table id="boss-table">
        <thead>
            <tr>
                <th class="col-読み仮名">読み仮名</th>
                <th class="col-マップ">マップ</th>
                <th class="col-ボス">ボス</th>
                <th class="col-マップ英語">マップ英語</th>
                <th class="col-ボス英語">ボス英語</th>
                <th class="col-耐性アイコン">耐性アイコン</th>
                <th class="col-元ボスアクト">元ボスアクト</th>
                <th class="col-元ボスエリア">元ボスエリア</th>
                <th class="col-元ボス名">元ボス名</th>
                <th class="col-元ボス特徴">元ボス特徴</th>
                <th class="col-メモ is-hidden-column is-hidden">メモ</th>
            </tr>
        </thead>
        <tbody id="boss-table-body">
        </tbody>
    </table>

    <div class="controls-wrapper" style="margin-top: 40px; border-top: 1px solid var(--border-color); padding-top: 20px;">
        <div class="controls-section">
            <div class="section-title">データ一括更新（スプレッドシートからペースト）</div>
            <div class="button-group">
                <textarea id="pasteArea" class="update-textarea" style="width: 600px; height: 36px;" placeholder="スプレッドシートから【1行目の項目名（ヘッダー）】を含めて複数行・複数列をペースト"></textarea>
                <button onclick="updateGrid()">反映する</button>
                <button class="btn-success" onclick="exportDataCode()">更新データをコピー</button>
            </div>
            <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">
                ※必ずスプレッドシートの<strong>「1行目の項目名（読み仮名、マップなど）」を含めて</strong>コピーしてください。<br>
                ※コピー完了後は、テキストエディタで「poe2mapboss.json」を開き、中身を上書き保存してください。
            </div>
        </div>
    </div>

    <script>
        // =========================================
        // グローバル変数
        // =========================================
        let initialData = [];
        let defaultData = [];
        let currentData = [];
        let sortStates = { "sort-kana": true, "sort-eng": true };

        const iconMap = {
            "Armour": "IconEnemyArmour.png", "ArmourStrong": "IconEnemyArmourStrong.png",
            "Evasion": "IconEnemyEvasion.png", "EvasionStrong": "IconEnemyEvasionStrong.png",
            "Fire": "IconEnemyResistanceFire.png", "FireStrong": "IconEnemyResistanceFireStrong.png", "FireWeak": "IconEnemyResistanceFireWeak.png",
            "Cold": "IconEnemyResistanceCold.png", "ColdStrong": "IconEnemyResistanceColdStrong.png", "ColdWeak": "IconEnemyResistanceColdWeak.png",
            "Lightning": "IconEnemyResistanceLightning.png", "LightningStrong": "IconEnemyResistanceLightningStrong.png", "LightningWeak": "IconEnemyResistanceLightningWeak.png",
            "Chaos": "MonsterResistanceIconChaos.png", "ChaosStrong": "IconEnemyResistanceChaosStrong.png"
        };

        // ページ読み込み完了時に実行（外部JSONファイルの読み込み）
        document.addEventListener('DOMContentLoaded', () => {
            // 指定されたファイル名「poe2mapboss.json」からデータをfetch
            fetch('poe2mapboss.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTPエラー: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    initialData = data;
                    defaultData = JSON.parse(JSON.stringify(initialData));
                    currentData = [...initialData];
                    renderTable(currentData);
                })
                .catch(error => {
                    console.error('データの読み込みに失敗しました:', error);
                    const tbody = document.getElementById('boss-table-body');
                    tbody.innerHTML = `<tr><td colspan="11" style="text-align:center; color:#ff6b6b; padding: 20px;">
                        データの読み込みに失敗しました。<br>
                        サーバー上で実行しているか、同じフォルダに「poe2mapboss.json」が存在するか確認してください。
                    </td></tr>`;
                });
        });

        function renderTable(data) {
            const tbody = document.getElementById('boss-table-body');
            let htmlStr = '';

            const hiddenCols = [];
            document.querySelectorAll('th.is-hidden-column').forEach(th => {
                const colClass = Array.from(th.classList).find(c => c.startsWith('col-'));
                if (colClass) hiddenCols.push(colClass);
            });

            const getHiddenClass = (colName) => hiddenCols.includes(`col-${colName}`) ? 'is-hidden-column is-hidden' : '';
            const attrSlots = ['Armour', 'Evasion', 'Fire', 'Cold', 'Lightning', 'Chaos'];

            data.forEach(item => {
                const bossResistances = (item.耐性アイコン || "-").split(/<br>/i);
                
                const iconsHtml = bossResistances.map(resistStr => {
                    const keys = resistStr.split(',').map(k => k.trim()).filter(k => k !== '');
                    
                    const slotHtml = attrSlots.map(attr => {
                        const foundKey = keys.find(k => k.startsWith(attr));
                        if (foundKey && iconMap[foundKey]) {
                            return `<img src="${iconMap[foundKey]}" alt="${foundKey}" title="${foundKey}" class="icon-img">`;
                        } else {
                            return `<span class="icon-text">-</span>`;
                        }
                    }).join('');
                    
                    return `<div class="resist-row-inline">${slotHtml}</div>`;
                }).join('');

                htmlStr += `<tr>
                    <td class="col-読み仮名 ${getHiddenClass('読み仮名')}">${item.読み仮名 || ''}</td>
                    <td class="col-マップ ${getHiddenClass('マップ')}">${item.マップ || ''}</td>
                    <td class="col-ボス ${getHiddenClass('ボス')}">${item.ボス || ''}</td>
                    <td class="col-マップ英語 ${getHiddenClass('マップ英語')}">${item.マップ英語 || ''}</td>
                    <td class="col-ボス英語 ${getHiddenClass('ボス英語')}">${item.ボス英語 || ''}</td>
                    <td class="col-耐性アイコン ${getHiddenClass('耐性アイコン')}">${iconsHtml}</td>
                    <td class="col-元ボスアクト ${getHiddenClass('元ボスアクト')}">${item.元ボスアクト || ''}</td>
                    <td class="col-元ボスエリア ${getHiddenClass('元ボスエリア')}">${item.元ボスエリア || ''}</td>
                    <td class="col-元ボス名 ${getHiddenClass('元ボス名')}">${item.元ボス名 || ''}</td>
                    <td class="col-元ボス特徴 ${getHiddenClass('元ボス特徴')}">${item.元ボス特徴 || ''}</td>
                    <td class="col-メモ ${getHiddenClass('メモ')}">${item.メモ || ''}</td>
                </tr>`;
            });

            tbody.innerHTML = htmlStr;

            if (document.getElementById('searchInput').value.trim() !== '') {
                filterTable();
            }
        }

        function normalizeText(str) {
            return str.replace(/[\u30a1-\u30f6]/g, m => String.fromCharCode(m.charCodeAt(0) - 0x60)).toLowerCase();
        }

        function filterTable() {
            const filter = normalizeText(document.getElementById('searchInput').value);
            
            document.querySelectorAll('#boss-table tbody tr').forEach(row => {
                const rowText = normalizeText(row.textContent);
                row.classList.toggle('is-hidden', !rowText.includes(filter));
            });
        }

        function sortTable(key, btnId) {
            const btn = document.getElementById(btnId);
            const labelBase = btn.dataset.label; 
            const isAsc = sortStates[btnId]; 

            currentData.sort((a, b) => {
                return isAsc 
                    ? String(a[key] || '').localeCompare(String(b[key] || '')) 
                    : String(b[key] || '').localeCompare(String(a[key] || ''));
            });

            btn.textContent = labelBase + (isAsc ? "：逆" : "：順");
            
            document.querySelectorAll('[id^="sort-"]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            sortStates[btnId] = !isAsc; 
            renderTable(currentData);  
        }

        function toggleColumns(cols, btnId) {
            const btn = document.getElementById(btnId);
            const isCurrentlyHidden = btn.classList.contains('active'); 
            
            if (isCurrentlyHidden) {
                btn.classList.remove('active');
                btn.textContent = `${btn.dataset.label}：表示`;
            } else {
                btn.classList.add('active');
                btn.textContent = `${btn.dataset.label}：非表示`;
            }

            cols.forEach(colName => {
                document.querySelectorAll(`.col-${colName}`).forEach(el => {
                    if (isCurrentlyHidden) {
                        el.classList.remove('is-hidden-column'); 
                    } else {
                        el.classList.add('is-hidden-column');    
                    }
                });
            });

            applyColumnVisibility();
        }

        function applyColumnVisibility() {
            document.querySelectorAll('th, td').forEach(el => {
                if (el.classList.contains('is-hidden-column')) {
                    el.classList.add('is-hidden');
                } else {
                    el.classList.remove('is-hidden');
                }
            });
        }

        function resetView() {
            initialData = JSON.parse(JSON.stringify(defaultData)); 
            currentData = [...initialData];

            document.getElementById('searchInput').value = '';
            
            sortStates = { "sort-kana": true, "sort-eng": true };
            document.getElementById('sort-kana').textContent = "五十音：順";
            document.getElementById('sort-eng').textContent = "アルファベット：順";
            document.querySelectorAll('[id^="sort-"]').forEach(b => b.classList.remove('active'));
            
            document.querySelectorAll('[id^="btn-"]').forEach(btn => {
                if (btn.id === 'btn-memo') {
                    btn.classList.add('active');
                    btn.textContent = `${btn.dataset.label}：非表示`;
                } else {
                    btn.classList.remove('active');
                    btn.textContent = `${btn.dataset.label}：表示`;
                }
            });

            document.querySelectorAll('.is-hidden-column').forEach(el => el.classList.remove('is-hidden-column', 'is-hidden'));
            
            document.querySelectorAll('.col-メモ').forEach(el => {
                el.classList.add('is-hidden-column', 'is-hidden');
            });
            
            renderTable(currentData); 
        }

        function updateGrid() {
            const text = document.getElementById('pasteArea').value; 
            
            if (!text.trim()) {
                alert("テキストエリアにスプレッドシートのデータをペーストしてください。");
                return;
            }

            const rows = text.split(/\r?\n/);

            if (rows[rows.length - 1] === "") {
                rows.pop(); 
            }

            if (rows.length < 2) {
                alert("エラー：データが足りません。\nスプレッドシートの【1行目（項目名）】と【データ行】を一緒にコピー＆ペーストしてください。");
                return;
            }

            const headers = rows[0].split('\t').map(h => h.trim());
            const newInitialData = []; 

            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split('\t'); 
                
                let newItem = {
                    "読み仮名": "", "マップ": "", "ボス": "", "マップ英語": "", "ボス英語": "",
                    "耐性アイコン": "-", "元ボスアクト": "", "元ボスエリア": "", "元ボス名": "", "元ボス特徴": "", "メモ": ""
                };

                headers.forEach((headerName, colIndex) => {
                    if (newItem.hasOwnProperty(headerName)) {
                        newItem[headerName] = cols[colIndex] !== undefined ? cols[colIndex].trim() : "";
                    }
                });

                newInitialData.push(newItem);
            }

            initialData = newInitialData;
            currentData = [...initialData];

            document.getElementById('searchInput').value = ''; 
            renderTable(currentData); 

            alert(`${rows.length - 1} 件のボスデータを一括更新しました！\n\n※この時点ではまだファイルに保存されていません。完了後「更新データをコピー」ボタンをご利用ください。`);
            document.getElementById('pasteArea').value = ''; 
        }

        function exportDataCode() {
            const jsonStr = JSON.stringify(initialData, null, 4);

            navigator.clipboard.writeText(jsonStr).then(() => {
                // アラート内のファイル名もpoe2mapboss.jsonに変更
                alert("最新のデータをクリップボードにコピーしました！\n\nエディタで「poe2mapboss.json」を開き、中身を全て上書き保存してください。");
            }).catch(err => {
                alert("コピーに失敗しました。お使いのブラウザの権限設定を確認してください。\nエラー: " + err);
            });
        }
    </script>
</body>
</html>
