<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoE2 メモ</title>
    <style>
        /* =========================================
           CSS変数（poe2mapboss準拠）
        ========================================= */
        :root {
            --bg-body: #0f172a;
            --bg-panel: #1e293b;
            --bg-table: #1e293b;
            --bg-th: #334155;
            --bg-tr-even: #0f172a;
            --bg-tr-hover: #2dd4bf1a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --accent-gold: #d4af37;
            --accent-gold-hover: #fef08a;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        h1, h2 {
            color: #ffffff;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        h2 {
            font-size: 20px;
            margin-top: 40px;
            margin-bottom: 20px;
        }
        p.note {
            background-color: var(--bg-panel);
            padding: 15px;
            border-left: 4px solid var(--accent-gold);
            margin-bottom: 30px;
            font-size: 16px;
            border-radius: 0 4px 4px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
            background-color: var(--bg-table);
        }
        th, td {
            border: 1px solid var(--border-color);
            padding: 10px;
            text-align: center;
            vertical-align: middle;
        }
        th {
            background-color: var(--bg-th);
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.4;
            letter-spacing: 0.05em;
        }
        .nowrap {
            white-space: nowrap;
        }
        td {
            font-size: 15px;
            height: 24px;
        }
        tr:nth-child(even) {
            background-color: var(--bg-tr-even);
        }
        tr:hover {
            background-color: var(--bg-tr-hover);
        }

        /* スタッシュ価格テーブル用の個別スタイル */
        .store-table {
            width: auto;
            margin-left: auto;
            margin-right: auto;
        }
        .store-table td:nth-child(2) {
            text-align: right;
            padding-right: 20px;
        }

        a.back-link {
            color: var(--accent-gold);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            margin-bottom: 20px;
            transition: color 0.2s ease, transform 0.2s ease;
        }
        a.back-link:hover {
            color: var(--accent-gold-hover);
            transform: translateX(-4px);
        }
    </style>
</head>
<body>
    <a href="poe2index.html" class="back-link">
        <svg style="width:16px;height:16px;margin-right:4px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Indexに戻る
    </a>
    
    <div class="container">
        <h1>PoE2 メモ</h1>
        
        <p class="note">
            マジック・レア敵はモンスターレベル＋１、画面上部にライフゲージが出る敵はモンスターレベル＋２のアイテムを落とす？
        </p>

        <h2>ジェム要求ステータス</h2>
        <table>
            <thead>
                <tr>
                    <th class="nowrap">ジェムレベル</th>
                    <th class="nowrap">要求レベル</th>
                    <th>要求能力値<br>（単一）</th>
                    <th>要求能力値<br>（筋力、器用さ、知性のうち２つ）</th>
                    <th>ドロップする<br>モンスターレベル<br>（多分）</th>
                    <th>アセンダンシーや装備品スキルの<br>ソケット数</th>
                </tr>
            </thead>
            <tbody id="gem-tbody">
            </tbody>
        </table>

        <h2>スタッシュ価格</h2>
        <table class="store-table">
            <thead>
                <tr>
                    <th class="nowrap">スタッシュ</th>

                    <th class="nowrap">セール</th>
                    <th class="nowrap">エグザイルの<br>スタッシュ<br>バンドル</th>

            </thead>
            <tbody id="store-tbody">

        </table>
    </div>

        // テーブル生成処理 (ストア)
        const storeTbody = document.getElementById('store-tbody');
        storeData.forEach(row => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="text-align: left;" class="nowrap">${row.name}</td>

</body>
</html>
